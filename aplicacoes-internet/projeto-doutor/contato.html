<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Dr. Robervando Paixão</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="curriculo.html">Currículo</a>
        <a href="especialidade.html">Especialidade</a>
        <a href="contato.html">Contato</a>
    </nav>
    <main>
        <section>
            <h2>Contato</h2>
            <p>Agende sua consulta. Por favor, indique sua preferência por dia e horário. Após checarmos a disponibilidade, entraremos em contato com você para confirmação.</p>
            <form action="#" method="post">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
                <br>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
                <br>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required>
                <br>
                <label for="consultorio">Consultório de preferência:</label>
                <select id="consultorio" name="consultorio">
                    <option value="ICCAT">ICCAT:</option>
                </select>
                <br>
                <label for="data">Data da Consulta:</label>
                <input type="date" id="data" name="data">
                <br>
                <label for="origem">Como chegou ao nosso site?</label>
                <select id="origem" name="origem">
                    <option value="Google">Google</option>
                    <option value="Redes Sociais">Redes Sociais</option>
                    <option value="Indicação">Indicação</option>
                    <option value="Outros">Outros</option>
                </select>
                <br>
                <label for="mensagem">Mensagem <span>*</span></label>
                <textarea id="mensagem" name="mensagem" required></textarea>
                <br>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer>Dr.Robervando Paixão - 2025</footer>
</body>
</html>
